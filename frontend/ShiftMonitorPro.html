<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Monitor Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0E1A;--bg2:#111827;--bg3:#1A2235;--bg4:#222D42;
  --border:#2A3548;--border2:#3A4A65;
  --text:#E8EDF5;--text2:#8A97B0;--text3:#5A6A85;
  --accent:#3B82F6;--accent2:#60A5FA;
  --green:#10B981;--green2:#34D399;
  --amber:#F59E0B;--amber2:#FCD34D;
  --red:#EF4444;--red2:#F87171;
  --purple:#8B5CF6;--purple2:#A78BFA;
  --teal:#14B8A6;--teal2:#2DD4BF;
  --radius:10px;--radius2:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}

.sidebar{width:224px;min-width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-weight:700;font-size:15px}
.logo-sub{font-size:10px;color:var(--text2);font-family:'IBM Plex Mono',monospace;letter-spacing:1px}
.sidebar-user{padding:12px 16px;border-bottom:1px solid var(--border)}
.role-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;margin-bottom:7px}
.role-super{background:rgba(139,92,246,.15);color:var(--purple2);border:1px solid rgba(139,92,246,.3)}
.role-branch{background:rgba(59,130,246,.15);color:var(--accent2);border:1px solid rgba(59,130,246,.3)}
.role-employee{background:rgba(16,185,129,.15);color:var(--green2);border:1px solid rgba(16,185,129,.3)}
.role-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.user-name{font-weight:600;font-size:13px}
.user-email{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-section{padding:10px 16px 3px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text3);letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;border-left:2px solid transparent;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,.1);color:var(--accent2);border-left-color:var(--accent)}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-family:'IBM Plex Mono',monospace}
.sidebar-bottom{padding:14px 16px;border-top:1px solid var(--border)}
.logout-btn{width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:12px;font-family:'Sora',sans-serif;transition:all .15s;display:flex;align-items:center;gap:8px}
.logout-btn:hover{border-color:var(--red);color:var(--red2)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;overflow-y:auto;min-width:0;-webkit-overflow-scrolling:touch}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.page-title{font-size:16px;font-weight:600;flex:1}
.nst-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.3);border-radius:20px;font-size:11px;color:var(--teal2);font-family:'IBM Plex Mono',monospace}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
.clock-display{font-size:12px;color:var(--text2);font-family:'IBM Plex Mono',monospace}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.content{flex:1;overflow-y:auto;padding:24px;-webkit-overflow-scrolling:touch}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;font-size:12px;font-family:'Sora',sans-serif;transition:all .15s;font-weight:500;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#2563EB;border-color:#2563EB;color:#fff}
.btn-success{background:var(--green);border-color:var(--green);color:#fff}
.btn-success:hover{background:#059669;color:#fff}
.btn-danger{background:var(--red);border-color:var(--red);color:#fff}
.btn-danger:hover{background:#DC2626;color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-weight:600;font-size:14px}
.card-sub{font-size:11px;color:var(--text2);font-family:'IBM Plex Mono',monospace;margin-top:2px}

.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:repeat(4,1fr)}

.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{font-size:10px;color:var(--text2);font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase}
.stat-value{font-size:26px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;margin-top:5px;color:var(--text3)}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:10px 12px;font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;border-bottom:1px solid var(--border);text-transform:uppercase}
tbody td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.015)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:rgba(16,185,129,.15);color:var(--green2)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red2)}
.badge-amber{background:rgba(245,158,11,.15);color:var(--amber2)}
.badge-blue{background:rgba(59,130,246,.15);color:var(--accent2)}
.badge-gray{background:rgba(138,151,176,.1);color:var(--text2)}
.badge-purple{background:rgba(139,92,246,.15);color:var(--purple2)}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

.progress-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}

.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;background:rgba(59,130,246,.2);color:var(--accent2)}

/* Clock widget */
.clock-widget{background:linear-gradient(135deg,#1A2235,#0F1929);border:1px solid var(--border2);border-radius:var(--radius2);padding:28px;text-align:center}
.clock-big{font-size:48px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:-2px;line-height:1}
.clock-date-str{color:var(--text2);font-size:13px;margin-top:6px;font-family:'IBM Plex Mono',monospace}
.nst-label{display:inline-block;margin-top:8px;padding:3px 10px;background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.3);border-radius:20px;font-size:11px;color:var(--teal2);font-family:'IBM Plex Mono',monospace}
.clock-status-row{display:inline-flex;align-items:center;gap:8px;margin:14px auto;padding:8px 20px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:20px;font-size:13px}

/* Session pills */
.sessions-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.session-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;font-family:'IBM Plex Mono',monospace}
.session-pill.open{border-color:var(--green);background:rgba(16,185,129,.08)}
.session-num{font-size:10px;color:var(--text3);margin-right:2px}

/* Salary notice */
.salary-notice{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.25);border-radius:var(--radius);padding:12px 16px;font-size:12px;color:var(--amber2);line-height:1.6;margin-bottom:16px}
.salary-notice strong{color:var(--amber)}

.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}
.form-input{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:'Sora',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
select.form-input{cursor:pointer;appearance:none}
textarea.form-input{resize:vertical;min-height:80px}

.toast{position:fixed;top:16px;right:16px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;font-size:13px;z-index:9999;animation:slideIn .25s ease;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:300px;line-height:1.5}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--accent)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;margin-top:20px}

.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;overflow-y:auto;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:40px;width:100%;max-width:380px}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:26px}
.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);padding:10px 12px;color:var(--red2);font-size:13px;margin-bottom:14px;display:none}

.empty{text-align:center;padding:36px 20px;color:var(--text3)}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-text{font-size:13px}

.timeline{position:relative;padding-left:18px}
.timeline::before{content:'';position:absolute;left:4px;top:8px;bottom:8px;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:14px}
.tl-item::before{content:'';position:absolute;left:-17px;top:4px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2)}
.tl-time{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.tl-text{font-size:12px;color:var(--text2);margin-top:1px}

.bar-chart{display:flex;align-items:flex-end;gap:5px;height:80px}
.bar{flex:1;border-radius:4px 4px 0 0;min-width:6px}
.bar-label{font-size:10px;color:var(--text3);text-align:center;margin-top:3px;font-family:'IBM Plex Mono',monospace}

@media(max-width:768px){
  .sidebar{display:none}
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
  /* Bottom nav for mobile employees */
  .mobile-bottom-nav{display:flex}
  .main{padding-bottom:68px}
  .content{padding:16px}
  .topbar{padding:0 16px}
  .clock-widget{border-radius:12px}
}
@media(min-width:769px){
  .mobile-bottom-nav{display:none!important}
}
.mobile-bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:64px;
  background:var(--bg2);
  border-top:1px solid var(--border);
  z-index:100;
  align-items:stretch;
}
.mob-nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;
  letter-spacing:.03em;padding:6px 4px;transition:color .15s;position:relative;
  border:none;background:none;
}
.mob-nav-item.active{color:var(--accent2)}
.mob-nav-item.active .mob-nav-icon{color:var(--accent2)}
.mob-nav-icon{font-size:20px;line-height:1}
.mob-nav-badge{
  position:absolute;top:6px;right:calc(50% - 14px);
  background:var(--red2);color:#fff;font-size:9px;font-weight:700;
  border-radius:8px;padding:1px 5px;min-width:16px;text-align:center;
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ============================================================
// CONFIG
// ============================================================
const API = 'https://shiftmanagerpro-production.up.railway.app/api';

// ============================================================
// NEPAL TIME  (UTC + 5:45)
// ============================================================
function nowNST() {
  const offset = (5 * 60 + 45) * 60 * 1000;
  return new Date(Date.now() + offset);
}
function fmtNSTTime(d) {
  const n = d || nowNST();
  return n.toISOString().slice(11, 19); // HH:MM:SS
}
function fmtNSTDate(d) {
  const n = d || nowNST();
  return n.toISOString().slice(0, 10);
}
function fmtNSTFull(d) {
  const n = d || nowNST();
  return n.toISOString().slice(0, 19).replace('T', ' ');
}
function fmtNSTDateLong(d) {
  const n = d ? new Date(new Date(d).getTime() + (5*60+45)*60000) : nowNST();
  return n.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

// ============================================================
// STATE
// ============================================================
let S = { user:null, accessToken:null, page:'dashboard', data:{} };

// ============================================================
// API
// ============================================================
// Single in-flight refresh promise — prevents multiple concurrent 401s
// from each firing their own /auth/refresh request simultaneously.
let _refreshPromise = null;

async function tryRefresh() {
  if (_refreshPromise) return _refreshPromise; // reuse in-flight refresh
  _refreshPromise = (async () => {
    try {
      const d = await fetch(API+'/auth/refresh', { method:'POST', credentials:'include' }).then(r=>r.json());
      if (d.accessToken) {
        S.accessToken = d.accessToken;
        // Proactively schedule next refresh 60s before token expiry (14 min from now)
        // so we never hit an expired-token 401 during normal page use.
        clearTimeout(_refreshTimer);
        _refreshTimer = setTimeout(tryRefresh, 14 * 60 * 1000);
        return true;
      }
    } catch(_) {}
    return false;
  })();
  try { return await _refreshPromise; } finally { _refreshPromise = null; }
}
let _refreshTimer = null;

// Global 429 backoff flag — when rate limited, pause ALL requests for 60s
let _rateLimitedUntil = 0;

async function apiFetch(path, opts={}) {
  // If we're in a rate-limit backoff window, reject immediately — don't hammer the server
  if (Date.now() < _rateLimitedUntil) {
    const secsLeft = Math.ceil((_rateLimitedUntil - Date.now()) / 1000);
    throw new Error(`Rate limited. Please wait ${secsLeft}s before retrying.`);
  }

  const headers = { 'Content-Type':'application/json', ...opts.headers };
  if (S.accessToken) headers['Authorization'] = 'Bearer ' + S.accessToken;
  let res = await fetch(API + path, { ...opts, headers, credentials:'include' });

  // 429 — back off for 60 seconds, stop all further requests
  if (res.status === 429) {
    _rateLimitedUntil = Date.now() + 60 * 1000;
    toast('Too many requests — pausing for 60 seconds.', 'error');
    throw new Error('Rate limited. Pausing requests for 60 seconds.');
  }

  if (res.status === 401 && path !== '/auth/login') {
    // One shared refresh attempt — all concurrent 401s share the same promise
    const ok = await tryRefresh();
    if (ok) { headers['Authorization'] = 'Bearer ' + S.accessToken; res = await fetch(API + path, { ...opts, headers, credentials:'include' }); }
    else { logout(); return null; }
  }
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || 'Request failed');
  return json;
}
const apiGet    = p      => apiFetch(p);
const apiPost   = (p, b) => apiFetch(p, { method:'POST',   body: JSON.stringify(b) });
const apiPut    = (p, b) => apiFetch(p, { method:'PUT',    body: JSON.stringify(b) });
const apiDelete = p      => apiFetch(p, { method:'DELETE' });

// ============================================================
// TOAST
// ============================================================
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ============================================================
// AUTH
// ============================================================
async function login(email, password) {
  const d = await apiPost('/auth/login', { email, password });
  S.accessToken = d.accessToken; S.user = d.user; S.page = 'dashboard';
  await loadPage(); render();
}
function logout() {
  apiPost('/auth/logout', {}).catch(()=>{});
  S.user=null; S.accessToken=null; S.data={}; S.page='dashboard'; render();
}

// ============================================================
// NAVIGATION
// ============================================================
async function nav(page) {
  const samePageRefresh = (page === S.page);
  S.page = page;
  await loadPage();
  const existing = document.getElementById('content');
  if (existing) {
    const scroller = document.querySelector('.content');
    // Only preserve scroll when refreshing the same page (e.g. after clock-in/out)
    // Scroll to top when the user navigates to a different page
    const scrollY = (samePageRefresh && scroller) ? scroller.scrollTop : 0;
    existing.innerHTML = renderPage();
    if (scroller) scroller.scrollTop = scrollY;
    attachEvents();
  } else {
    render();
  }
}

async function loadPage() {
  try {
    const p = S.page;
    const r = S.user?.role;

    // Fetch branches only when actually needed — not on every page load.
    // Previously this ran on every nav() for super_admin, causing a request
    // storm that triggered the rate limiter.
    const needsBranches = (p === 'branches') ||
                          (p === 'employees' && r === 'super_admin') ||
                          (p === 'settings'  && r === 'super_admin') ||
                          (!S.data.branches  && r === 'super_admin'); // first load only
    if (needsBranches) S.data.branches = await apiGet('/branches');

    if (p==='dashboard')   S.data.dashboard   = await apiGet('/dashboard');
    if (p==='live')        S.data.live        = await apiGet('/attendance/today');
    if (p==='employees')   S.data.employees   = await apiGet('/users');
    if (p==='attendance')  { S.data.attendance = await apiGet('/attendance?limit=30'); S.data.attStats = await apiGet('/attendance/stats'); }
    if (p==='salary') {
      S.data.salary = r === 'employee'
        ? await apiGet('/salary/my-salary')
        : await apiGet('/salary');
    }
    if (p==='corrections') S.data.corrections = await apiGet('/corrections');
    if (p==='settings')    S.data.shifts      = await apiGet('/shifts');
    if (p==='profile')     S.data.me          = await apiGet('/users/me');
  } catch(e) {
    // Show error but do NOT re-trigger nav/render — that causes infinite retry loops
    if (!e.message.includes('Rate limited')) toast(e.message, 'error');
  }
}

// ============================================================
// HELPERS
// ============================================================
function initials(n) { return (n||'').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2); }
function fmtTime(dt) {
  if (!dt) return '—';
  // dt is stored as Nepal time in DB, display as-is
  const s = typeof dt === 'string' ? dt : dt.toISOString();
  return s.slice(11,16); // HH:MM
}
function fmtDateShort(d) {
  if (!d) return '—';
  const s = typeof d === 'string' ? d : d.toISOString().slice(0,10);
  const [y,m,day] = s.slice(0,10).split('-');
  return `${day}/${m}/${y}`;
}
function fmtMins(m) {
  if (!m && m!==0) return '—';
  return `${Math.floor(m/60)}h ${m%60}m`;
}
function fmtNPR(v) {
  if (!v && v!==0) return '—';
  return 'NPR ' + parseFloat(v).toLocaleString('en-IN', { minimumFractionDigits:2, maximumFractionDigits:2 });
}
function monthName(m) {
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1] || m;
}
function salaryStatusBadge(s) {
  if (s === 'paid_out')      return '<span style="background:rgba(16,185,129,.15);color:var(--green2);border:1px solid rgba(16,185,129,.3);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap">✓ Paid Out</span>';
  if (s === 'processing')    return '<span style="background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.3);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap">⟳ Processing</span>';
  return '<span style="background:rgba(148,163,184,.08);color:var(--text3);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap">— Not Processed</span>';
}

function statusBadge(s) {
  const m={present:'badge-green',absent:'badge-red',late:'badge-amber',half_day:'badge-blue',holiday:'badge-gray',
           pending:'badge-amber',approved:'badge-green',rejected:'badge-red',clocked_out:'badge-gray'};
  return `<span class="badge ${m[s]||'badge-gray'}">${(s||'—').replace(/_/g,' ')}</span>`;
}

// Render session pills for a list of sessions
function renderSessionPills(sessions) {
  if (!sessions || !sessions.length) return '<span style="color:var(--text3);font-size:12px">—</span>';
  return `<div class="sessions-row">${sessions.map((s,i)=>`
    <div class="session-pill ${!s.clock_out?'open':''}">
      <span class="session-num">#${i+1}</span>
      <span>${fmtTime(s.clock_in)}</span>
      <span style="color:var(--text3)">→</span>
      <span>${s.clock_out ? fmtTime(s.clock_out) : '<span style="color:var(--green2)">Active</span>'}</span>
      ${s.duration_min ? `<span style="color:var(--text3);margin-left:2px">${fmtMins(s.duration_min)}</span>` : ''}
    </div>`).join('')}</div>`;
}

// ============================================================
// RENDER ROOT
// ============================================================
function render() {
  if (!S.user) {
    document.getElementById('root').innerHTML = renderLogin();
    attachEvents();
    return;
  }
  const existing = document.getElementById('content');
  if (existing) {
    // App shell already rendered — only swap the content area
    // Save scroll position so mobile users don't get jumped to top
    const scroller = document.querySelector('.content');
    const scrollY = scroller ? scroller.scrollTop : 0;
    existing.innerHTML = renderPage();
    // Restore scroll position after DOM update
    if (scroller) scroller.scrollTop = scrollY;
    attachEvents();
  } else {
    // First render — build the full shell
    document.getElementById('root').innerHTML = renderApp();
    attachEvents();
  }
}

// EMPLOYEE DASHBOARD (Complete & Dynamic)
// ============================================================
function renderEmployeeDash() {
  const d   = S.data.dashboard || {};
  const ms  = d.month_stats || {};
  const rh  = d.recent_history || [];
  const sal = d.salary || {};
  const curSal = sal.current;

  // 1. CALCULATE CUMULATIVE DAILY TIME
  // Sum duration_min of every CLOSED session directly from today_sessions.
  // We deliberately avoid d.today?.total_minutes because that cached DB column
  // can be stale (only written on each clock-out) and returns 0 when the
  // attendance row hasn't been flushed yet.
  const closedSessionMins = (d.today_sessions || []).reduce((sum, s) => sum + (s.duration_min || 0), 0);

  // Add live elapsed time from the currently-open session (if any)
  let liveSessionMins = 0;
  if (d.clocked_in && d.open_session?.clock_in) {
    liveSessionMins = Math.floor((nowNST().getTime() - new Date(d.open_session.clock_in).getTime()) / 60000);
  }

  let cumulativeMins = closedSessionMins + liveSessionMins;

  // 2. OVERTIME CALCULATIONS (6 Hours / 360 Minutes threshold)
  const LIMIT = 360; 
  const isOvertime = cumulativeMins >= LIMIT;
  const minsRemaining = Math.max(0, LIMIT - cumulativeMins);
  const remainingStr = `${Math.floor(minsRemaining / 60)}h ${minsRemaining % 60}m`;

  // Salary data
  const curSalMonth  = curSal ? monthName(sal.month) + ' ' + sal.year : null;
  const salaryColor  = curSal ? 'var(--green2)' : 'var(--text3)';

  // Live monitor data — colleagues clocked in right now
  const liveTeam = (d.live_today || []).filter(e => e.user_id !== (S.user?.id));

  return `
  <div class="grid grid-2" style="gap:20px">

    <!-- ── LEFT COLUMN ─────────────────────────────────── -->
    <div>

      <!-- CLOCK WIDGET -->
      <div class="clock-widget" style="margin-bottom:16px">
        <div class="clock-big" id="emp-clock">${fmtNSTTime()}</div>
        <div class="clock-date-str" id="emp-date">${fmtNSTDate()}</div>

        <div id="ot-countdown" style="margin:18px 0;height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center">
          ${isOvertime
            ? `<span class="badge badge-amber" style="padding:10px 20px;font-weight:700;border:1px solid var(--amber);box-shadow:0 0 15px rgba(245,158,11,.3)">🔥 DOUBLE PAY ACTIVE</span>`
            : `<div>
                 <div class="stat-label" style="margin-bottom:4px">TIME UNTIL DOUBLE PAY</div>
                 <div id="ot-remaining" style="font-size:22px;font-weight:600;font-family:var(--mono);color:var(--accent2);line-height:1">${remainingStr}</div>
                 <div id="ot-worked" style="font-size:10px;color:var(--text3);margin-top:4px">Total worked today: ${fmtMins(cumulativeMins)}</div>
               </div>`}
        </div>

        <div class="clock-status-row" id="clock-status-row">
          ${d.clocked_in
            ? `<div class="status-dot"></div><span id="active-session-timer" style="color:var(--green2)">Active: ${fmtMins(Math.floor((nowNST().getTime()-new Date(d.open_session.clock_in).getTime())/60000))}</span>`
            : `<span style="color:var(--text2)">Currently Out</span>`}
        </div>
        <div style="display:flex;gap:8px;justify-content:center">
          ${d.clocked_in
            ? `<button class="btn btn-danger" id="clockout-btn" style="flex:1;padding:12px;font-size:14px">⏹ Clock Out (NST)</button>`
            : `<button class="btn btn-success" id="clockin-btn" style="flex:1;padding:12px;font-size:14px">▶ Clock In (NST)</button>`}
        </div>
      </div>

      <!-- ── SALARY WIDGET ───────────────────────────── -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <div class="card-title">💰 My Salary</div>
          <button class="btn btn-sm" data-nav="salary">Full History</button>
        </div>
        ${curSal ? `
          <!-- Status + computed date row -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:8px 12px;background:var(--surface2);border-radius:8px">
            <div>
              <div style="font-size:10px;color:var(--text3);letter-spacing:.05em;margin-bottom:3px">PAYMENT STATUS</div>
              ${salaryStatusBadge(curSal.status)}
            </div>
            <div style="text-align:right">
              <div style="font-size:10px;color:var(--text3);letter-spacing:.05em;margin-bottom:2px">COMPUTED UP TO</div>
              <div style="font-size:12px;color:var(--text2);font-family:var(--mono)">${curSal.computed_up_to ? curSal.computed_up_to.toString().slice(0,10) : (curSal.computed_at ? curSal.computed_at.toString().slice(0,10) : '—')}</div>
            </div>
          </div>
          <div class="grid grid-2" style="gap:10px;margin-bottom:14px">
            <div class="stat" style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15)">
              <div class="stat-label">THIS MONTH (${curSalMonth})</div>
              <div class="stat-value" style="font-size:20px;color:var(--green2)">${fmtNPR(curSal.base_salary)}</div>
              <div class="stat-sub">NPR</div>
            </div>
            <div class="stat">
              <div class="stat-label">HOURS LOGGED</div>
              <div class="stat-value" style="font-size:20px">${curSal.total_hours||0}h</div>
              <div class="stat-sub">${curSal.regular_hours||0}h reg + <span style="color:var(--amber)">${curSal.extra_hours||0}h OT</span></div>

// LIVE MONITOR (Updated with 2x Pay Highlighting)
// ============================================================
function renderLive() {
  const rows = (S.data.live || []);
  const active = rows.filter(r => r.sessions?.some(s => !s.clock_out));
  const off    = rows.filter(r => !r.sessions?.some(s => !s.clock_out));

  return `
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
    <div class="nst-badge">📡 LIVE — ${fmtNSTDate()} NST</div>
    <span style="color:var(--text2);font-size:13px">${active.length} currently clocked in</span>
  </div>
  
  <div class="grid grid-3" style="margin-bottom:20px">
    ${active.length ? active.map(e => {
      const openSess = e.sessions?.find(s => !s.clock_out);
      
      // Check for 6-hour (360 min) threshold
      const isOvertime = e.total_minutes >= 360;

      return `
      <div class="card" style="border-left:3px solid ${isOvertime ? 'var(--amber)' : 'var(--green)'}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div class="avatar">${initials(e.full_name)}</div>
          <div style="flex:1">
            <div style="font-weight:500;font-size:13px">${e.full_name}</div>
            <div style="font-size:11px;color:var(--text3)">${e.branch_name || ''}</div>
          </div>
          
          <!-- Conditional Badge -->
          ${isOvertime 
            ? '<span class="badge badge-amber" title="Double Pay Enabled">🔥 2x PAY</span>' 
            : '<span class="badge badge-green"><span class="badge-dot"></span>Active</span>'
          }
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div style="background:var(--bg3);border-radius:6px;padding:8px">
            <div style="font-size:10px;color:var(--text3);font-family:var(--mono)">CURRENT IN</div>
            <div style="font-weight:500;font-family:var(--mono);font-size:13px">${fmtTime(openSess?.clock_in)} NST</div>
          </div>
          <div style="background:var(--bg3);border-radius:6px;padding:8px">
            <div style="font-size:10px;color:var(--text3);font-family:var(--mono)">TOTAL TODAY</div>
            <div style="font-weight:500;color:${isOvertime ? 'var(--amber2)' : 'var(--green2)'};font-family:var(--mono);font-size:13px">
              ${fmtMins(e.total_minutes)}
            </div>
          </div>
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--text3)">${e.sessions?.length || 0} session(s) today</div>
      </div>`;
    }).join('') : '<div class="card" style="grid-column:1/-1"><div class="empty"><div class="empty-icon">📡</div><div class="empty-text">No one currently clocked in</div></div></div>'}
  </div>

  <div class="card">
    <div class="card-header"><div class="card-title">Off / Completed</div></div>
    ${off.length ? `<div class="table-wrap"><table>
      <thead><tr><th>Employee</th><th>Branch</th><th>Sessions</th><th>Total Hours</th><th>Status</th></tr></thead>
      <tbody>${off.map(e => {
        const isOT = e.total_minutes >= 360;
        return `<tr>
          <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar">${initials(e.full_name)}</div>${e.full_name}</div></td>
          <td style="color:var(--text2)">${e.branch_name || '—'}</td>
          <td>${renderSessionPills(e.sessions)}</td>
          <td style="font-family:var(--mono);font-size:12px;color:${isOT ? 'var(--amber2)' : 'var(--green2)'}">
            ${fmtMins(e.total_minutes)} ${isOT ? '<strong>(2x)</strong>' : ''}
          </td>
          <td>${statusBadge(e.status || 'absent')}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>` : '<div class="empty"><div class="empty-text">All employees are clocked in</div></div>'}
  </div>`;
}

// ============================================================
// SALARY PAGE
// ============================================================
function renderSalary() {
  const role = S.user.role;
  const rows = S.data.salary || [];
  const nowNP = nowNST();
  const month = nowNP.getMonth() + 1;
  const year = nowNP.getFullYear();
  const branches = S.data.branches || []; // We'll use the branches loaded in loadPage

  // Group by user for admins
  const grouped = {};
  rows.forEach(r => {
    if (!grouped[r.user_id]) grouped[r.user_id] = { full_name: r.full_name, employee_code: r.employee_code, branch_name: r.branch_name, records: [] };
    grouped[r.user_id].records.push(r);
  });

  return `
  ${renderSalaryNotice()}
  <div class="card" style="margin-bottom: 20px;">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      
      <!-- Branch Selector: Only for Super Admin -->
      ${role === 'super_admin' ? `
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">BRANCH</label>
        <select class="form-input" id="sal-branch-select" style="width:200px">
          <option value="">-- Select Branch --</option>
          ${branches.map(b => `<option value="${b.id}">${b.name}</option>`).join('')}
        </select>
      </div>` : ''}

      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">MONTH</label>
        <select class="form-input" id="sal-month" style="width:130px">
          ${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${i+1===month?'selected':''}>${monthName(i+1)}</option>`).join('')}
        </select>
      </div>

      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">YEAR</label>
        <input class="form-input" type="number" id="sal-year" value="${year}" style="width:90px">
      </div>

      <div style="display:flex;gap:8px">
        <button class="btn" id="filter-salary-btn">🔍 Filter</button>
        ${role !== 'employee' ? `
          <button class="btn btn-primary" id="compute-salary-btn">⚙️ Compute Salary</button>` : ''}
      </div>
    </div>
  </div>

  ${role === 'employee' ? renderMySalaryTable(rows) : renderAdminSalaryTable(grouped)}`;
}

    </div>

let _modalConfirm = null;
function renderModal() { return ''; }
function openModal(title, body, confirmText, onConfirm) {
  closeModal();
  _modalConfirm = onConfirm;
  const div = document.createElement('div');
  div.id = 'modal-overlay';
  div.className = 'modal-overlay';
  div.innerHTML = `
    <div class="modal">
      <div class="modal-title">${title}</div>${body}
      <div class="modal-actions">
        ${confirmText?`<button class="btn btn-primary" id="modal-confirm">${confirmText}</button>`:''}
        <button class="btn" id="modal-cancel">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(div);
  document.getElementById('modal-confirm')?.addEventListener('click', async () => {
    try { await _modalConfirm(); closeModal(); } catch(e) { toast(e.message,'error'); }
  });
  document.getElementById('modal-cancel')?.addEventListener('click', closeModal);
  div.addEventListener('click', e => { if(e.target===div) closeModal(); });
}
function closeModal() { document.getElementById('modal-overlay')?.remove(); }

      description = parts.join(' | ');
    } else {
      if (!freeText.trim()) { toast('Please enter a description.','error'); return; }
    }

    // Find the attendance_id for the selected session
    const selectedSession = todaySessions.find(s => String(s.id) === String(sessionId));

    await apiPost('/corrections', {
      work_date:     workDate,
      issue_type:    issueType,
      description,
      session_id:    sessionId  ? parseInt(sessionId)              : null,
      attendance_id: selectedSession ? selectedSession.attendance_id : null,
    });
    toast('Correction request submitted','success');
    S.data.corrections = await apiGet('/corrections');
    render();
  });

  // Expose globally so the date input onchange can call it
  window._loadCorSessions = loadSessionsForDate;

  // Trigger display logic for the default selected issue type (wrong_time)
  // immediately after the modal renders — onchange doesn't fire on initial render
  setTimeout(() => {
    const sel = document.getElementById('m-ctype');
    if (sel) sel.dispatchEvent(new Event('change'));
    // Also load sessions for the default date
    loadSessionsForDate(document.getElementById('m-cdate')?.value || fmtNSTDate());
  }, 50);
  };
  document.getElementById('req-correction-btn')?.addEventListener('click', openCorrectionModal);
  document.getElementById('new-correction-btn')?.addEventListener('click', openCorrectionModal);
  document.querySelectorAll('[data-approve]').forEach(btn => btn.addEventListener('click', async () => {
    const cid  = btn.dataset.approve;
    const date = btn.dataset.date;
    const emp  = btn.dataset.emp;
    const desc = btn.dataset.desc || '';

    // Parse employee-submitted correct times from description
    let prefilledIn = '', prefilledOut = '';
    const inMatch  = desc.match(/Requested clock-in:\s*([\d\-]+ [\d:]+)/);
    const outMatch = desc.match(/Requested clock-out:\s*([\d\-]+ [\d:]+)/);
    if (inMatch)  prefilledIn  = inMatch[1].trim().replace(' ','T').slice(0,16);
    if (outMatch) prefilledOut = outMatch[1].trim().replace(' ','T').slice(0,16);

    // Fetch all sessions for this employee+date so admin can manage them
    let allSessions = [];
    try {
      const att = await apiGet('/attendance?user_id=' + btn.dataset.userid + '&from=' + date + '&to=' + date);
      allSessions = att?.data?.[0]?.sessions || [];
    } catch(_) {}

    const renderSessions = () => {
      const wrap = document.getElementById('m-cor-sessions');
      if (!wrap) return;
      wrap.innerHTML = allSessions.length ? allSessions.map((s,i) => `
        <div style="display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:center;padding:8px;background:var(--surface3);border-radius:6px;margin-bottom:6px" data-sid="${s.id}">
          <span style="font-size:11px;color:var(--text3);font-weight:600">#${i+1}</span>
          <input type="datetime-local" class="form-input s-in" style="font-family:var(--mono);font-size:12px;padding:6px 8px"
            value="${s.clock_in ? s.clock_in.toString().slice(0,16).replace(' ','T') : ''}">
          <input type="datetime-local" class="form-input s-out" style="font-family:var(--mono);font-size:12px;padding:6px 8px"
            value="${s.clock_out ? s.clock_out.toString().slice(0,16).replace(' ','T') : ''}">
          <button onclick="window._delSession(${s.id})" style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:12px">✕</button>
        </div>`).join('') : '<div style="font-size:12px;color:var(--text3);padding:8px">No sessions for this day yet.</div>';
    };

    // Global helpers for inline delete (called from onclick in rendered HTML)
    window._delSession = async (sid) => {
      if (!confirm('Delete this session?')) return;
      try {
        await apiDelete('/attendance/session/' + sid);
        allSessions = allSessions.filter(s => s.id !== sid);
        renderSessions();
        toast('Session deleted.', 'success');
      } catch(e) { toast(e.message, 'error'); }
    };

    openModal(`Manage Sessions — ${emp} (${date})`, `
      <!-- Employee request -->
      <div style="background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:14px;border-left:3px solid var(--accent2)">
        <div style="font-size:10px;font-weight:700;color:var(--accent2);letter-spacing:.08em;margin-bottom:4px">EMPLOYEE REQUESTED</div>
        <div style="font-size:12px;color:var(--text2);font-family:var(--mono)">${desc || '(no time specified)'}</div>
      </div>

      <!-- Session list editor -->
      <div style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.08em;margin-bottom:8px">
        ALL SESSIONS FOR ${date} — Edit times inline, or delete unwanted sessions
      </div>
      <div id="m-cor-sessions" style="margin-bottom:14px"></div>

      <!-- Add new session -->
      <div style="background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:var(--green2);letter-spacing:.08em;margin-bottom:10px">+ ADD NEW SESSION</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group" style="margin:0">
            <label class="form-label">CLOCK IN (NST)</label>
            <input class="form-input" id="m-cor-in" type="datetime-local"
              style="font-family:var(--mono)" value="${prefilledIn}">
          </div>
          <div class="form-group" style="margin:0">
            <label class="form-label">CLOCK OUT (NST)</label>
            <input class="form-input" id="m-cor-out" type="datetime-local"
              style="font-family:var(--mono)" value="${prefilledOut}">
          </div>
        </div>
      </div>

      <!-- Override total -->
      <div style="background:var(--surface2);border-radius:8px;padding:14px">
        <div style="font-size:11px;font-weight:700;color:var(--amber);letter-spacing:.08em;margin-bottom:10px">OVERRIDE TOTAL HOURS DIRECTLY</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="form-group" style="margin:0">
            <label class="form-label">HOURS</label>
            <input class="form-input" id="m-cor-hrs" type="number" min="0" max="24" step="1" placeholder="e.g. 7">
          </div>
          <div class="form-group" style="margin:0">
            <label class="form-label">MINUTES</label>
            <input class="form-input" id="m-cor-min" type="number" min="0" max="59" step="1" placeholder="e.g. 30">
          </div>
        </div>
      </div>
    `, 'Save & Approve', async () => {
      try {
        // 1. Save edits to existing sessions
        const sessionRows = document.querySelectorAll('#m-cor-sessions [data-sid]');
        for (const row of sessionRows) {
          const sid    = row.dataset.sid;
          const inVal  = row.querySelector('.s-in')?.value;
          const outVal = row.querySelector('.s-out')?.value;
          if (inVal) {
            await apiPut('/attendance/session/' + sid, {
              clock_in:  inVal.replace('T',' ') + ':00',
              clock_out: outVal ? outVal.replace('T',' ') + ':00' : null,
            });
          }
        }

        // 2. Add new session if provided
        const newIn  = document.getElementById('m-cor-in')?.value;
        const newOut = document.getElementById('m-cor-out')?.value;
        if (newIn && newOut) {
          if (new Date(newOut) <= new Date(newIn)) { toast('Clock-out must be after clock-in.','error'); return; }
          await apiPut('/corrections/' + cid + '/approve', {
            clock_in:  newIn.replace('T',' ')  + ':00',
            clock_out: newOut.replace('T',' ') + ':00',
          });
        }

        // 3. Override total if provided
        const hrs  = parseInt(document.getElementById('m-cor-hrs')?.value) || 0;
        const mins = parseInt(document.getElementById('m-cor-min')?.value) || 0;
        if (hrs || mins) {
          await apiPut('/corrections/' + cid + '/approve', { total_minutes: hrs * 60 + mins });
        }

        // 4. If nothing else was done, just approve
        if (!newIn && !newOut && !hrs && !mins) {
          await apiPut('/corrections/' + cid + '/approve', {});
        }

        toast('Sessions updated and correction approved.', 'success');
        S.data.corrections = await apiGet('/corrections');
        render();
      } catch(e) { toast(e.message, 'error'); }
    });

    // Render sessions after modal opens
    setTimeout(renderSessions, 50);
  }));
  document.querySelectorAll('[data-reject]').forEach(btn=>btn.addEventListener('click',async()=>{
    try { await apiPut('/corrections/'+btn.dataset.reject+'/reject',{}); toast('Rejected','info'); S.data.corrections=await apiGet('/corrections'); render(); } catch(e){toast(e.message,'error');}
  }));

  document.querySelectorAll('[data-delete-correction]').forEach(btn => btn.addEventListener('click', async () => {
    if (!confirm('Delete this correction request? This cannot be undone.')) return;
    try {
      await apiDelete('/corrections/' + btn.dataset.deleteCorrection);
      toast('Correction request deleted.', 'success');
      S.data.corrections = await apiGet('/corrections');
      render();
    } catch(e) { toast(e.message, 'error'); }
  }));

  // Attendance filter
  document.getElementById('att-filter-btn')?.addEventListener('click', async () => {
    const from=document.getElementById('att-from')?.value, to=document.getElementById('att-to')?.value;
    const q=new URLSearchParams({limit:'50'}); if(from)q.set('from',from); if(to)q.set('to',to);
    try { S.data.attendance=await apiGet('/attendance?'+q); document.getElementById('content').innerHTML=renderPage(); attachEvents(); } catch(e){toast(e.message,'error');}
  });

  // Shifts
  document.getElementById('add-shift-btn')?.addEventListener('click',()=>openModal('Add Shift (NST)',`
    <div class="form-group"><label class="form-label">NAME</label><input class="form-input" id="m-sname" placeholder="e.g. Morning Shift"></div>
    <div class="form-group"><label class="form-label">START (NST)</label><input class="form-input" id="m-sstart" type="time" value="09:00"></div>
    <div class="form-group"><label class="form-label">END (NST)</label><input class="form-input" id="m-send" type="time" value="17:00"></div>
    <div class="form-group"><label class="form-label">BREAK (MIN)</label><input class="form-input" id="m-sbreak" type="number" value="30" min="0"></div>
  `,'Create',async()=>{
    await apiPost('/shifts',{branch_id:S.user.branch_id,name:document.getElementById('m-sname').value,start_time:document.getElementById('m-sstart').value,end_time:document.getElementById('m-send').value,break_minutes:parseInt(document.getElementById('m-sbreak').value)});
    toast('Shift created','success'); await loadPage(); render();
  }));
  document.querySelectorAll('[data-edit-shift]').forEach(btn=>btn.addEventListener('click',()=>{
    const s=JSON.parse(btn.dataset.shift);
    openModal('Edit Shift (NST)',`
      <div class="form-group"><label class="form-label">NAME</label><input class="form-input" id="m-sname" value="${s.name}"></div>
      <div class="form-group"><label class="form-label">START (NST)</label><input class="form-input" id="m-sstart" type="time" value="${s.start_time}"></div>
      <div class="form-group"><label class="form-label">END (NST)</label><input class="form-input" id="m-send" type="time" value="${s.end_time}"></div>
      <div class="form-group"><label class="form-label">BREAK (MIN)</label><input class="form-input" id="m-sbreak" type="number" value="${s.break_minutes}"></div>
    `,'Save',async()=>{
      await apiPut('/shifts/'+s.id,{name:document.getElementById('m-sname').value,start_time:document.getElementById('m-sstart').value,end_time:document.getElementById('m-send').value,break_minutes:parseInt(document.getElementById('m-sbreak').value)});
      toast('Shift updated','success'); await loadPage(); render();
    });
  }));
  document.querySelectorAll('[data-del-shift]').forEach(btn=>btn.addEventListener('click',async()=>{
    try{await apiDelete('/shifts/'+btn.dataset.delShift);toast('Shift removed','info');await loadPage();render();}catch(e){toast(e.message,'error');}
  }));

  // Profile / password
  document.getElementById('save-profile-btn')?.addEventListener('click',async()=>{
    try{await apiPut('/users/me',{full_name:document.getElementById('profile-name').value,phone:document.getElementById('profile-phone').value});toast('Profile updated','success');}catch(e){toast(e.message,'error');}
  });
  document.getElementById('change-pwd-btn')?.addEventListener('click',async()=>{
    const np=document.getElementById('pwd-new').value,cp=document.getElementById('pwd-confirm').value;
    if(np!==cp){toast('Passwords do not match','error');return;}
    try{await apiPost('/auth/change-password',{current_password:document.getElementById('pwd-current').value,new_password:np});toast('Password changed','success');['pwd-current','pwd-new','pwd-confirm'].forEach(id=>document.getElementById(id).value='');}catch(e){toast(e.message,'error');}
  });
}

// ============================================================
// NST CLOCK TICK
// ============================================================
setInterval(() => {
  const t = fmtNSTTime();
  const topEl = document.getElementById('topbar-clock');
  const empEl = document.getElementById('emp-clock');

  if (topEl) topEl.textContent = t;
  if (empEl) empEl.textContent = t;

  // Update OT countdown every second using in-memory session data.
  // We never reset to 6h on clock-out because we always base the
  // calculation on ALL of today's sessions (closed + any open one),
  // regardless of whether the employee is currently clocked in or not.
  if (S.user?.role === 'employee' && S.page === 'dashboard') {
    const d = S.data.dashboard;
    if (d) {
      // Sum all CLOSED sessions from the in-memory snapshot
      const closedMins = (d.today_sessions || []).reduce((sum, s) => sum + (s.duration_min || 0), 0);

      // Add live time from the currently-open session (if any)
      let liveMins = 0;
      if (d.clocked_in && d.open_session?.clock_in) {
        liveMins = Math.floor((nowNST().getTime() - new Date(d.open_session.clock_in).getTime()) / 60000);
      }

      const totalMins = closedMins + liveMins;
      const LIMIT     = 360;
      const remaining = Math.max(0, LIMIT - totalMins);
      const isOT      = totalMins >= LIMIT;

      // Patch the OT countdown in-place — no full re-render needed
      const otEl      = document.getElementById('ot-countdown');
      const remEl     = document.getElementById('ot-remaining');
      const workedEl  = document.getElementById('ot-worked');
      const activeEl  = document.getElementById('active-session-timer');
      const summedEl  = document.getElementById('summed-work-today');

      if (otEl) {
        if (isOT && !remEl) {
          // Transition from counting-down to "DOUBLE PAY ACTIVE" — needs a re-render
          nav('dashboard');
          return;
        }
        if (remEl) {
          remEl.textContent = `${Math.floor(remaining / 60)}h ${remaining % 60}m`;
        }
        if (workedEl) {
          workedEl.textContent = `Total worked today: ${fmtMins(totalMins)}`;
        }
      }

      // Keep the sessions table "Summed Work Today" row in sync
      if (summedEl) {
        summedEl.textContent = fmtMins(totalMins);
      }

      // Also update the "Active: Xh Ym" current-session timer
      if (activeEl && d.clocked_in && d.open_session?.clock_in) {
        activeEl.textContent = `Active: ${fmtMins(liveMins)}`;
      }
    }
  }
}, 1000);

// Auto-refresh live page every 30s
setInterval(async () => {
  if (S.user && S.page==='live') {
    S.data.live = await apiGet('/attendance/today').catch(()=>S.data.live);
    const c = document.getElementById('content');
    if (c) { c.innerHTML = renderPage(); attachEvents(); }
  }
}, 30000);

// ============================================================
// BOOT — restore session
// ============================================================
(async () => {
  const ok = await tryRefresh();
  if (ok) {
    // Start proactive refresh timer so token never expires during the session
    _refreshTimer = setTimeout(tryRefresh, 14 * 60 * 1000);
    const me = await apiGet('/users/me').catch(()=>null);
    if (me) { S.user = me; await loadPage(); }
  }
  render();
})();
</script>
</body>
</html>
